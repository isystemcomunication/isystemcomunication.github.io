<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IOSx — Device Config Tool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0a;
    --bg2:      #111111;
    --bg3:      #181818;
    --surface:  rgba(255,255,255,0.04);
    --surface2: rgba(255,255,255,0.06);
    --border:   rgba(255,255,255,0.08);
    --border2:  rgba(255,255,255,0.13);
    --text:     #ffffff;
    --muted:    #888888;
    --dim:      #555555;
    --green:    #4ade80;
    --red:      #f87171;
    --accent:   #ffffff;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    letter-spacing: -0.01em;
    min-height: 100%;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  /* ── AUTH SCREEN ───────────────────────────────── */
  #authScreen {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 20px 40px;
  }
  .auth-card {
    width: 100%;
    max-width: 440px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 24px;
    padding: 36px 28px 28px;
  }
  .auth-logo {
    font-family: 'Manrope', sans-serif;
    font-size: 48px;
    font-weight: 800;
    text-align: center;
    letter-spacing: -2.4px;
    line-height: 1;
    margin-bottom: 6px;
    color: var(--text);
  }
  .auth-logo .x { color: var(--muted); }
  .auth-subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    font-weight: 400;
    line-height: 1.55;
    margin-bottom: 28px;
  }
  .auth-google-btn {
    display: flex;
    width: 100%;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 13px 16px;
    border-radius: 14px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s;
    min-height: 50px;
    -webkit-tap-highlight-color: transparent;
  }
  .auth-google-btn:hover  { background: var(--surface2); border-color: rgba(255,255,255,0.22); }
